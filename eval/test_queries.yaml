# eval/test_queries.yaml
#
# Substrate - Test Query Bank
# 33 queries across 4 tiers of difficulty.
# Version 3.0
#
# Changes from v2:
#   - Added context_keywords field: words expected in retrieved CHUNK TEXT
#     (docstrings + code), not just function names
#   - Rewrote notes to describe what good retrieval looks like
#   - Sharpened ambiguous queries (T1-007, T3-001)
#   - must_retrieve kept as secondary strict signal only
#   - keywords kept for LLM answer eval (future use)
# Changes from v1:
#   - Removed all class names (not indexed as functions by tree-sitter):
#     StandardScaler, BertModel, GenerationMixin, BertSelfAttention,
#     BaseModelOutput, EvalPrediction, libsvm, GroupBy (kept functions)
#   - T1-001: removed 'clipn' (does not exist in index)
#   - All remaining must_retrieve verified present in bm25_function.pkl
#
# Each query has:
#   id:           unique identifier
#   query:        the natural language question
#   tier:         1=single-repo, 2=cross-repo, 3=deep-trace, 4=hypothetical
#   repos:        which repos the answer should draw from
#   must_retrieve: function names that MUST appear in top-10 results
#                  (used for retrieval-only evaluation, no LLM needed)
#   keywords:     terms that should appear in a good answer
#   anti_keywords: terms that signal a hallucinated/wrong answer
#   notes:        grading guidance for human/LLM judge
#
# Tiers:
#   1 - Single-repo factual: answer lives entirely in one codebase
#   2 - Cross-repo lookup: answer requires linking 2 repos
#   3 - Deep trace: answer requires following a call chain 3+ hops
#   4 - Hypothetical impact: "what would break if X changed"
#
# Note: This test cases where generated by Claude

